<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nav bar</title>
  </head>

  <!-- CSS starts here  -->

  <style>
    header {
      background-color: rgb(209, 205, 205);
      width: 70%;

      /* align-items: center; */
      margin: auto;
    }
    ul {
      /* display: flex; */
      /* margin: 0px 20px 0px 0px; */
      /* gap: 20px; */
      text-decoration: none;
      list-style: none;
    }

    li {
      display: inline-block;
      padding: 5px;
      transition: 0.2s;

    }
    li:hover {

      color: rgb(21, 255, 0);
      background-color: rgb(245, 26, 179);
      padding: 5px;
      border-radius: 5px;

    }
    li:active{
     background-color: rgb(15, 110, 253);
    }

    h1 {
      font-family: "Franklin Gothic Medium", "Arial Narrow", Arial, sans-serif;
    }

    p {
      color: rgb(59, 59, 59);
      font-size: large;
    }

    nav {
      background-color: #333333;
      /* color: white; */
      box-shadow: 2px 2px 10px 2px black;
      height: 80px;
      margin: auto;
    }
    a {
      text-decoration: none;
      color: white;
    }

    h1,
    p {
      padding: 0px 0px 20px 10px;
      transition: 0.2s;
    }
    p:hover {
      color: black;
      font-size: large;
    }
    h1:hover {
      color: darkslategrey;
    }

    nav > ul > li > a {
      display: inline;
      color: rgb(255, 255, 255);
    }
  </style>

  <!-- CSS ends here  -->

  <body>
    <header>
      <nav>
        <ul>
          <li><a href="#"> Home </a></li>
          <li><a href="#"> About </a></li>
          <li><a href="#"> Services </a></li>
          <li><a href="#"> Contact </a></li>
        </ul>
      </nav>

      <h1>Welcome To Our Website</h1>
      <p>Discover the amazing world of web design!</p>
    </header>
  </body>
</html>
